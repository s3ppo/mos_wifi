name: Build and Release

on:
  push:
    tags:
      - '[0-9]*'
  workflow_dispatch:
    inputs:
      version:
        description: '0.0.1'
        required: true
        default: '0.0.1'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build Vue plugin
        working-directory: page
        env:
          PLUGIN_VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          npm install
          npm run build

      - name: Create package structure
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          PKG_NAME="mos-wifi-${VERSION}-1+mos-plugin"
          PKG_DIR="${PKG_NAME}_amd64"

          mkdir -p ${PKG_DIR}/var/www/mos-plugins/mos-wifi
          mkdir -p ${PKG_DIR}/usr/bin/plugins
          mkdir -p ${PKG_DIR}/DEBIAN

          cp -R page/dist/mos-wifi/* ${PKG_DIR}/var/www/mos-plugins/mos-wifi/
          cp functions ${PKG_DIR}/var/www/mos-plugins/mos-wifi/functions
          cp settings.json ${PKG_DIR}/var/www/mos-plugins/mos-wifi/settings.json
          cp mos-wifi-driver-install.sh ${PKG_DIR}/usr/bin/plugins/mos-wifi-driver-install
          chmod +x ${PKG_DIR}/var/www/mos-plugins/mos-wifi/functions
          chmod +x ${PKG_DIR}/usr/bin/plugins/mos-wifi-driver-install

          cat > ${PKG_DIR}/DEBIAN/postinst << 'EOF'
          #!/bin/sh
          set -e

          if [ "$1" = "configure" ]; then
            if [ -x /usr/bin/plugins/mos-wifi-driver-install ]; then
              /usr/bin/plugins/mos-wifi-driver-install || true
            fi
          fi

          exit 0
          EOF
          chmod 755 ${PKG_DIR}/DEBIAN/postinst

          cat > ${PKG_DIR}/DEBIAN/control << EOF
          Package: mos-wifi
          Version: ${VERSION}-1+mos-plugin
          Architecture: amd64
          Maintainer: admin@minenet.at
          Depends: python3, apt
          Description: WiFi Drivers Plugin for MOS
          EOF

      - name: Build .deb package
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          PKG_NAME="mos-wifi-${VERSION}-1+mos-plugin"
          PKG_DIR="${PKG_NAME}_amd64"
          DEB_FILE="${PKG_NAME}_amd64.deb"

          dpkg-deb --build ${PKG_DIR}

          md5sum ${DEB_FILE} | awk '{print $1}' > ${DEB_FILE}.md5

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: mos-wifi ${{ steps.version.outputs.VERSION }}
          body: |
            ## mos-wifi Plugin ${{ steps.version.outputs.VERSION }}

          files: |
            mos-wifi-${{ steps.version.outputs.VERSION }}-1+mos-plugin_amd64.deb
            mos-wifi-${{ steps.version.outputs.VERSION }}-1+mos-plugin_amd64.deb.md5
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
